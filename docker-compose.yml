# Run the apartment sim in Docker with GPU-accelerated GUI via WSLg.
#
# Launch from a WSL2 (Windows 11) or native-Linux TERMINAL — not PowerShell:
#   docker compose up --build        # build (first time) + run
#   docker compose exec sim bash     # second terminal, e.g. for teleop
#
# Gazebo/RViz windows appear on your desktop, rendered on the host GPU.
services:
  sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: apartment_sim:humble
    container_name: apartment_sim
    network_mode: host          # simplest path for ROS 2 DDS discovery
    stdin_open: true
    tty: true
    shm_size: "2gb"             # Gazebo + RViz + DDS shared memory
    environment:
      # WSLg exposes the host X/Wayland server inside the WSL distro:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}
      - PULSE_SERVER=${PULSE_SERVER:-/mnt/wslg/PulseServer}
    devices:
      - /dev/dri:/dev/dri        # host GPU render/card nodes (WSL2 D3D12 / Linux DRI)
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:rw
      - /usr/lib/wsl:/usr/lib/wsl:ro   # WSL2 GPU user-mode driver libraries
      - ./bags:/ws/bags:rw             # rosbags recorded to /ws/bags persist on the host
    command: ros2 launch apartment_sim apartment.launch.py
